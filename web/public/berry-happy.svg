<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="100" height="110">
  <!-- Berry body -->
  <circle cx="50" cy="58" r="40" fill="#7B84A6"/>
  <ellipse cx="50" cy="50" rx="34" ry="24" fill="#8D96B5" opacity="0.45"/>
  <ellipse cx="50" cy="78" rx="28" ry="10" fill="#636B8E" opacity="0.3"/>

  <!-- Calyx - chunky 5-petal star -->
  <g transform="translate(50,18)">
    <path d="M0,-12 C4,-10 5,-4 0,0 C-5,-4 -4,-10 0,-12Z" fill="#4A5278"/>
    <path d="M0,-12 C4,-10 5,-4 0,0 C-5,-4 -4,-10 0,-12Z" fill="#4A5278" transform="rotate(72)"/>
    <path d="M0,-12 C4,-10 5,-4 0,0 C-5,-4 -4,-10 0,-12Z" fill="#4A5278" transform="rotate(144)"/>
    <path d="M0,-12 C4,-10 5,-4 0,0 C-5,-4 -4,-10 0,-12Z" fill="#4A5278" transform="rotate(216)"/>
    <path d="M0,-12 C4,-10 5,-4 0,0 C-5,-4 -4,-10 0,-12Z" fill="#4A5278" transform="rotate(288)"/>
    <circle r="4" fill="#4A5278"/>
  </g>

  <!-- Highlights -->
  <ellipse cx="38" cy="46" rx="5" ry="7" fill="white" opacity="0.45"/>
  <ellipse cx="44" cy="52" rx="2.5" ry="3" fill="white" opacity="0.3"/>

  <!-- Eyes -->
  <ellipse cx="38" cy="59" rx="3.8" ry="4.2" fill="#1a1a2e" opacity="0.85"/>
  <circle cx="40" cy="57.5" r="1.5" fill="white"/>
  <ellipse cx="62" cy="59" rx="3.8" ry="4.2" fill="#1a1a2e" opacity="0.85"/>
  <circle cx="64" cy="57.5" r="1.5" fill="white"/>

  <!-- Blush -->
  <ellipse cx="30" cy="65" rx="6" ry="3.5" fill="#E8897C" opacity="0.4"/>
  <ellipse cx="70" cy="65" rx="6" ry="3.5" fill="#E8897C" opacity="0.4"/>

  <!-- Mouth - open happy smile -->
  <path d="M43 68 Q50 77 57 68 Z" fill="#1a1a2e" opacity="0.75"/>
  <ellipse cx="50" cy="71.5" rx="2.5" ry="1.5" fill="#E8897C" opacity="0.5"/>
</svg>
