name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'Blueberries/**'
      - 'BlueberriesTests/**'
      - 'Blueberries.xcodeproj/**'
  pull_request:
    branches: [main]
    paths:
      - 'Blueberries/**'
      - 'BlueberriesTests/**'
      - 'Blueberries.xcodeproj/**'

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Build and Test
        run: |
          xcodebuild test \
            -project Blueberries.xcodeproj \
            -scheme Blueberries \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -resultBundlePath TestResults.xcresult \
            | xcbeautify || true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
